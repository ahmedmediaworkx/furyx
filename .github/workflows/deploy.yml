name: Deploy to AWS ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: furyx
  ECS_CLUSTER: furyx
  ECS_SERVICE: furyx
  CONTAINER_NAME: furyx

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        id: get-task-def
        run: |
          RESULT=$(aws ecs describe-task-definition \
            --task-definition ${{ env.CONTAINER_NAME }} \
            --query taskDefinition 2>&1) || true
          if echo "$RESULT" | grep -q 'Unable to describe\|does not exist\|ClientException'; then
            echo "No existing task definition found, skipping download"
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "$RESULT" > task-definition.json
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Build task definition from template (first deploy)
        if: steps.get-task-def.outputs.exists == 'false'
        run: |
          cat > task-definition.json << EOF
          {
            "family": "${{ env.CONTAINER_NAME }}",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "512",
            "memory": "1024",
            "executionRoleArn": "arn:aws:iam::312527861191:role/furyx-execution-role",
            "taskRoleArn": "arn:aws:iam::312527861191:role/furyx-task-role",
            "containerDefinitions": [
              {
                "name": "${{ env.CONTAINER_NAME }}",
                "image": "${{ steps.build-image.outputs.image }}",
                "essential": true,
                "portMappings": [{"containerPort": 3000, "protocol": "tcp"}],
                "environment": [
                  {"name": "NODE_ENV", "value": "production"},
                  {"name": "PORT", "value": "3000"},
                  {"name": "NEXTAUTH_URL", "value": "http://furyx-alb-387972706.us-east-1.elb.amazonaws.com"}
                ],
                "secrets": [
                  {"name": "NEXTAUTH_SECRET", "valueFrom": "arn:aws:secretsmanager:us-east-1:312527861191:secret:furyx/NEXTAUTH_SECRET-MLfzg2"},
                  {"name": "MONGODB_URI", "valueFrom": "arn:aws:secretsmanager:us-east-1:312527861191:secret:furyx/MONGODB_URI-qWkso7"}
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/furyx",
                    "awslogs-region": "us-east-1",
                    "awslogs-stream-prefix": "ecs"
                  }
                }
              }
            ]
          }
          EOF

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
